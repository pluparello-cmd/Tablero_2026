<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero SOOFT 2026 - IA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#f3f4f6; --surface:#ffffff; --text:#111827; --accent:#f97316; --border:rgba(0,0,0,0.1); }
  body { font-family:'DM Sans', sans-serif; background:var(--bg); color:var(--text); padding:20px; }
  .dashboard { max-width:1000px; margin:auto; background:var(--surface); padding:30px; border-radius:12px; box-shadow:0 4px 12px var(--border); }
  .btn-ia { background:#1a1f2e; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:700; }
  .ia-panel { margin-top:20px; padding:20px; border:1px solid #fb923c; border-radius:8px; background:#fff7ed; display:none; line-height:1.6; }
</style>
</head>
<body>

<div class="dashboard">
  <h1>Tablero SOOFT 2026</h1>
  <p>Análisis Inteligente de Objetivos Estratégicos</p>
  <hr style="margin:20px 0; opacity:0.1">
  
  <button class="btn-ia" id="btn-ia" onclick="analizarDashboard()">Analizar con Gemini IA</button>
  
  <div id="ia-panel" class="ia-panel">
    <strong style="color:#ea580c">Diagnóstico de la IA:</strong><br>
    <div id="ia-content"></div>
  </div>
</div>

<script>
let DATA = null;
const API_URL = localStorage.getItem('sooft_api_url') || prompt("Ingresa la URL de tu Apps Script (/exec):");

async function fetchDatos() {
  if (!API_URL) return;
  localStorage.setItem('sooft_api_url', API_URL);
  const res = await fetch(API_URL);
  DATA = await res.json();
}

async function analizarDashboard() {
  if (!DATA) return;
  const btn = document.getElementById('btn-ia');
  btn.innerText = "Analizando...";
  btn.disabled = true;

  const resumen = DATA.res_direccion.map(r => `• ${r.Obj_ID}: ${r.Objetivo} (${(parseFloat(r.YTD)*100).toFixed(1)}%)`).join('\n');
  const prompt = `Actúa como un experto consultor. Analiza estos KPIs de SOOFT:\n${resumen}\n\nDame un diagnóstico de 3 líneas y 2 sugerencias tácticas.`;

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ accion: 'analizar_ia', prompt: prompt })
    });
    const json = await res.json();
    document.getElementById('ia-content').innerHTML = json.respuesta.replace(/\n/g, '<br>');
    document.getElementById('ia-panel').style.display = 'block';
    btn.innerText = "Análisis Listo";
  } catch (e) {
    alert("Error al conectar con la IA");
    btn.innerText = "Analizar con IA";
    btn.disabled = false;
  }
}

window.onload = fetchDatos;
</script>
</body>
</html>
